
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
    	const testPainting = document.querySelector('#test-painting');
    	const avatarModel = document.querySelector('#avatarModel');
      avatarModel.addEventListener('click', () => {
        alert("Vous avez cliqué sur la peinture, affichage du modele")
        document.querySelector('#test-painting').style.visibility = "visible";
      })
    	testPainting.addEventListener('click', () => {
    	  console.log("start");
        alert("Vous avez cliqué sur la peinture")
    	});
    });
    </script>
  </head>
  <body>
    <a-scene mindar-image="missTolerance: 1; warmupTolerance: 10; filterMinCF: 1; filterBeta: 100; imageTargetSrc: https://wictorcode.github.io/source/targets_painting.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <!-- <img id="card" src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" /> -->
        <a-asset-item id="avatarModel" src="https://wictorcode.github.io/source/painting.obj"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- <a-plane src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane> -->
        <a-obj-model style="visibility: hidden" id="test-painting" rotation="0 -90 0 " position="0 0.05 0.1" scale="0.15 0.15 0.15" src="#avatarModel">
      </a-entity>
    </a-scene>
  </body>
</html>
